services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: laravel_app

    working_dir: /var/www

    volumes:
      - .:/var/www

    ports:
      - "8000:8000"

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0

    container_name: mysql_db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: creatorhub
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
